<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="2; url=https://chaohuang-tw.github.io/acsic-knowledge-hub/#/en/">
<title>ACSIC Knowledge Hub has moved｜網站已遷移</title>
<style>
:root{font-family:system-ui,sans-serif;background:#f4f7f5;color:#17352b}body{margin:0;min-height:100vh;display:grid;place-items:center}main{width:min(42rem,calc(100% - 2rem));background:#fff;border:1px solid #d8e3de;border-radius:1rem;padding:2rem;box-shadow:0 1rem 3rem rgba(23,53,43,.08)}h1{margin-top:0}a{color:#087a58;font-weight:700}
</style>
<script>
const base='https://chaohuang-tw.github.io/acsic-knowledge-hub/';
const hash=location.hash;
const zh=(navigator.languages||[navigator.language||'']).some(v=>/^zh-(TW|Hant)/i.test(v));
const locale=hash.startsWith('#/zh-TW')?'zh-TW':hash.startsWith('#/en')?'en':zh?'zh-TW':'en';
const target=base+(hash.startsWith('#/')?hash:'#/'+locale+'/');
setTimeout(()=>location.replace(target),900);
addEventListener('DOMContentLoaded',()=>document.getElementById('new-site').href=target);
</script>
</head>
<body><main>
<h1>ACSIC Knowledge Hub has moved</h1>
<p>The independent bilingual knowledge platform is now available at its new address.</p>
<h2>ACSIC Knowledge Hub 已遷移</h2>
<p>獨立雙語公開資料知識平台已移至新網址。</p>
<p><a id="new-site" href="https://chaohuang-tw.github.io/acsic-knowledge-hub/#/en/">Continue to the new site｜前往新網站</a></p>
</main></body>
</html>
